<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Kayra</title>
<style>
body{
margin:0;
overflow:hidden;
background:linear-gradient(45deg,#ff4da6,#ff99cc);
font-family:Arial;
text-align:center;
color:white;
}
h1{
margin-top:100px;
font-size:60px;
animation:zoom 2s infinite alternate;
}
p{
font-size:28px;
margin:12px;
}
.small{
font-size:22px;
margin-top:30px;
font-style:italic;
}
.balloon{
position:absolute;
bottom:-100px;
font-size:40px;
animation:float 8s linear infinite;
}
@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}
@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.15);}
}
</style>
</head>
<body>

<h1>🎉 Happy Birthday Kayra 🎂</h1>

<p>Wishing you happiness, joy and beautiful moments today ❤️</p>

<p>Enjoy your special day 😊</p>

<p class="small">From someone who thinks you are amazing 🌹</p>

<div class="balloon" style="left:10%;">🎈</div>
<div class="balloon" style="left:30%;animation-delay:2s;">🎈</div>
<div class="balloon" style="left:50%;animation-delay:4s;">🎈</div>
<div class="balloon" style="left:70%;animation-delay:1s;">🎈</div>
<div class="balloon" style="left:90%;animation-delay:3s;">🎈</div>

</body>
</html>
